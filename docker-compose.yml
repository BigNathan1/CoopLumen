version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: stellarcommons
      POSTGRES_PASSWORD: stellarcommons
      POSTGRES_DB: stellarcommons
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stellarcommons']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://stellarcommons:stellarcommons@db:5432/stellarcommons
      STELLAR_NETWORK: testnet
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - '4000:4000'
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
    ports:
      - '3000:3000'
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev

volumes:
  pg_data:
