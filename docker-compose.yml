version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cooplumen
      POSTGRES_PASSWORD: cooplumen
      POSTGRES_DB: cooplumen
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cooplumen']
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: bitnami/pgbouncer:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRESQL_HOST: db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: cooplumen
      POSTGRESQL_PASSWORD: cooplumen
      POSTGRESQL_DATABASE: cooplumen
      PGBOUNCER_DATABASE: cooplumen
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 100
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
    ports:
      - '6432:6432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -p 6432 -U cooplumen']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://cooplumen:cooplumen@db:5432/cooplumen
      STELLAR_NETWORK: testnet
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - '4000:4000'
    volumes:
      - ./backend/src:/app/src
    command: npm run dev
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
    ports:
      - '3000:3000'
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  pg_data:
