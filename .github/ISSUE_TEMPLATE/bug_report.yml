name: Bug Report
description: Report a reproducible bug in CoopLumen
title: 'fix: <short description>'
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: 'When I click X, Y happens instead of Z.'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reliably reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend API
        - Frontend UI
        - Stellar / blockchain
        - Database / migrations
        - Docker / infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: CoopLumen version / commit
      placeholder: 'e.g. main@abc1234'

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output, stack traces, or screenshots here.
      render: shell
